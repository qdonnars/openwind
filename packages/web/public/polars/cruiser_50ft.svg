    .angle-label { font-size: 11px; opacity: 0.7; }
    .cardinal { font-size: 11px; opacity: 0.7; font-style: italic; }
    .legend { font-size: 11px; }
    .legend-conv { font-size: 10.5px; opacity: 0.7; font-style: italic; }
  </style>

