[project]
name = "openwind-mcp-core"
version = "0.1.0"
description = "Cloud-agnostic FastMCP server for OpenWind — sailing planner tools."
requires-python = ">=3.12"
dependencies = [
    # MCP Apps support requires:
    # - 1.19.0+ for `meta=` kwarg on @tool / @resource (PR #1463)
    # - 1.23.3+ for the `text/html;profile=mcp-app` MIME validator (PR #1755)
    # - <1.28 to avoid the FastMCP -> MCPServer rename (post-1.27 HEAD)
    "mcp[cli]>=1.23.3,<1.28",
    "openwind-data",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openwind_mcp_core"]

[tool.uv.sources]
openwind-data = { path = "../data-adapters", editable = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "RUF"]
ignore = ["E501"]
